<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github issue tracker | login</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- tailwind+daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif !important;
        }
    </style>

</head>

<body class="min-h-screen max-w-lg bg-base-100 mx-auto">

    <div class="flex flex-col items-center">
        <div class="bg-white rounded-xl shadow-2xl flex flex-col items-center p-0" style="width:456px;height:743px;">
            <img src="assets/github-logo.png" alt="github logo" class="w-20 h-20 mt-10 mb-4">
            <h2 class="text-[28px] font-bold mb-1">GitHub Issues Tracker</h2>
            <p class="text-zinc-500 mb-6 text-base">Sign in to manage your issues</p>
            <form class="w-full px-8">
                <div class="mb-4">
                    <label class="block text-black font-semibold mb-1 text-[16px]">Username</label>
                    <input id="input-username" type="text" class="input input-bordered w-full text-[15px] py-2"
                        placeholder="Enter Username" />
                    <span class="text-xs text-[#4A00FF] mt-1 block">Default: admin</span>
                </div>
                <div class="mb-2">
                    <label class="block text-black font-semibold mb-1 text-[16px]">Password</label>
                    <input id="input-password" class="input input-bordered w-full text-[15px] py-2"
                        placeholder="Enter Password" />
                    <span class="text-xs text-[#4A00FF] mt-1 block">Default: admin123</span>
                </div>
                <button type="submit"
                    class="btn w-full mt-4 bg-[#4A00FF] hover:bg-[#3d02d1] text-white font-semibold text-[17px] py-2">Sign
                    In</button>
            </form>
            <div class="flex items-center w-full px-8 my-6">
                <div class="flex-grow h-px bg-gray-200"></div>
                <span class="mx-3 text-black font-normal text-[15px]">OR</span>
                <div class="flex-grow h-px bg-gray-200"></div>
            </div>
            <div class="w-[92%] flex flex-col items-center mt-2">
                <div class="text-center text-gray-400 text-[15px] font-medium mb-2">
                    Demo Credentials:
                </div>

                <div class="text-center text-[15px]">
                    <p><b>Username:</b> admin</p>
                    <p><b>Password:</b> admin123</p>
                </div>
            </div>
        </div>
    </div>

    </div>

    <script src="script/login.js"></script>
</body>

</html>
